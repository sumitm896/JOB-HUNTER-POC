name: Daily Job Hunter

# Runs job_hunter.py on a schedule and on demand.
on:
  schedule:
    # 06:00 UTC every day. Adjust the cron if you want a different time.
    # Format: minute hour day-of-month month day-of-week
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

jobs:
  run-job-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the job hunter
        env:
          # ── Required secrets (add these in repo Settings > Secrets) ──
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # ── Optional: Google Sheets dedup/logging. Leave unset to skip. ──
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python job_hunter.py
